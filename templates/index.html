<!DOCTYPE html>
<html>
<head>
    <title>Gold Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f7f8fc, #e2e8f0);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #d4af37;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #b8962e;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #2d3748;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gold Price Predictor</h2>

    <form method="POST">
        <label>SPX:</label>
        <input type="number" step="any" name="spx" required>

        <label>USO:</label>
        <input type="number" step="any" name="uso" required>

        <label>SLV:</label>
        <input type="number" step="any" name="slv" required>

        <label>EUR/USD:</label>
        <input type="number" step="any" name="eur_usd" required>

        <button type="submit">Predict Gold Price</button>
    </form>

    {% if prediction %}
        <div class="result">
            Predicted Gold Price: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
